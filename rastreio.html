<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0D0D" />
  <title>Busca Guincho — Acompanhe seu guincho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --ink:#0D0D0D; --yellow:#ffdd00; --green:#28A745; }
    html, body { height:100%; font-family:'Poppins',sans-serif; background:var(--ink); }
    #app { max-width:480px; margin:0 auto; height:100vh; position:relative; overflow:hidden; background:var(--ink); }
    #mapa { position:absolute; inset:0; z-index:1; }

    .track-top { position:absolute; top:0; left:0; right:0; z-index:1000;
      background:linear-gradient(180deg, rgba(13,13,13,.96), rgba(13,13,13,.7) 80%, transparent);
      color:#fff; padding:16px 18px 26px; display:flex; align-items:center; gap:13px; }
    .track-top .pulse { width:42px; height:42px; border-radius:50%; background:var(--yellow); color:var(--ink);
      display:grid; place-items:center; font-size:19px; flex-shrink:0; animation:pulse 1.6s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,221,0,.5)} 70%{box-shadow:0 0 0 14px rgba(255,221,0,0)} 100%{box-shadow:0 0 0 0 rgba(255,221,0,0)} }
    .tt-info { flex:1; min-width:0; }
    .track-top h1 { font-size:16px; font-weight:700; line-height:1.1; }
    .track-top p { font-size:12px; color:#bdbdbd; margin-top:3px; }
    .aovivo { color:#5ce081; font-weight:700; }
    /* ETA em destaque (negrito) */
    .tt-eta { margin-left:auto; background:var(--yellow); color:#000; border-radius:15px; padding:7px 14px; text-align:center; line-height:1; flex-shrink:0; box-shadow:0 6px 16px rgba(255,221,0,.4); }
    .tt-eta strong { font-size:26px; font-weight:800; display:block; letter-spacing:-.5px; }
    .tt-eta small { font-size:11px; font-weight:700; text-transform:uppercase; }

    /* card inferior do prestador */
    .track-card { position:absolute; left:14px; right:14px; bottom:16px; z-index:1000;
      background:#fff; border-radius:22px; padding:16px; display:flex; align-items:center; gap:13px; box-shadow:0 14px 40px rgba(0,0,0,.4); }
    .track-card img { width:54px; height:54px; border-radius:50%; object-fit:cover; background:#e6e8ec; }
    .track-card .tc-info { flex:1; } .track-card .tc-info strong { font-size:16px; color:var(--ink); } .track-card .tc-info small { display:block; font-size:12px; color:#6e7682; margin-top:2px; }
    .track-card .chat-btn { background:var(--ink); color:#fff; height:52px; padding:0 20px; border-radius:16px; display:flex; align-items:center; gap:9px; font-size:14px; font-weight:700; cursor:pointer; border:none; font-family:inherit; position:relative; transition:transform .1s; }
    .track-card .chat-btn:active { transform:scale(.96); }
    .track-card .chat-btn i { font-size:19px; color:var(--yellow); }
    .chat-badge { position:absolute; top:-6px; right:-4px; background:#e23c3c; color:#fff; font-size:10px; font-weight:800; border-radius:999px; padding:2px 7px; display:none; }

    /* ícones do mapa */
    .car-divicon, .voce-icon { background:transparent; border:none; }
    .voce-dot { position:absolute; left:-9px; top:-9px; width:18px; height:18px; border-radius:50%; background:var(--yellow); border:3px solid #000; box-shadow:0 1px 5px rgba(0,0,0,.4); z-index:3; }
    .voce-pulse { position:absolute; left:-9px; top:-9px; width:18px; height:18px; border-radius:50%; background:var(--yellow); z-index:1; animation:vocePulse 1.8s ease-out infinite; }
    @keyframes vocePulse { 0%{transform:scale(1);opacity:.65} 70%{transform:scale(3.6);opacity:0} 100%{opacity:0} }
    .voce-label { position:absolute; left:16px; top:-12px; white-space:nowrap; background:#000; color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:9px; box-shadow:0 3px 9px rgba(0,0,0,.35); z-index:4; }
    .voce-label::before { content:''; position:absolute; left:-5px; top:50%; transform:translateY(-50%); border:5px solid transparent; border-right-color:#000; }

    /* aviso */
    .aviso { position:absolute; inset:0; z-index:2000; background:var(--ink); color:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
    .aviso.show { display:flex; }
    .aviso i { font-size:48px; color:var(--yellow); margin-bottom:16px; }
    .aviso h2 { font-size:20px; margin-bottom:8px; } .aviso p { color:#bdbdbd; font-size:14px; }

    /* avaliação */
    .modal-avaliacao { position:absolute; inset:0; z-index:3000; background:rgba(13,13,13,.92); display:none; align-items:center; justify-content:center; padding:22px; }
    .modal-avaliacao.show { display:flex; }
    .av-card { background:#fff; border-radius:24px; padding:28px 22px; width:100%; max-width:400px; text-align:center; animation:up .35s ease; }
    @keyframes up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .av-card .check { width:64px; height:64px; border-radius:50%; background:#eafaf0; color:var(--green); display:grid; place-items:center; font-size:30px; margin:0 auto 14px; }
    .av-card h2 { font-size:19px; color:var(--ink); line-height:1.25; } .av-card .sub { font-size:13px; color:#6e7682; margin-top:6px; }
    .stars { display:flex; justify-content:center; gap:10px; margin:22px 0; }
    .stars i { font-size:38px; color:#e2e4e8; cursor:pointer; transition:transform .1s,color .15s; }
    .stars i.active { color:var(--yellow); }
    .av-card textarea { width:100%; border:1.5px solid #ececf0; border-radius:14px; padding:13px; font-family:inherit; font-size:14px; resize:none; outline:none; }
    .btn-enviar { width:100%; background:var(--ink); color:#fff; border:none; border-radius:14px; padding:15px; font-family:inherit; font-weight:700; font-size:15px; cursor:pointer; margin-top:14px; }
    .btn-enviar:disabled { opacity:.45; }
    .av-obrigado { display:none; }

    /* CHAT */
    .chat-overlay { position:absolute; inset:0; z-index:2500; background:rgba(0,0,0,.4); display:none; align-items:flex-end; }
    .chat-overlay.open { display:flex; }
    .chat-sheet { background:#f4f5f7; width:100%; height:80%; border-radius:24px 24px 0 0; display:flex; flex-direction:column; animation:up .3s ease; }
    .chat-head { background:#fff; border-radius:24px 24px 0 0; padding:16px 18px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 10px rgba(0,0,0,.05); }
    .chat-head img { width:42px; height:42px; border-radius:50%; object-fit:cover; background:#e6e8ec; }
    .chat-head strong { font-size:15px; color:var(--ink); display:block; } .chat-head small { font-size:11.5px; color:var(--green); }
    .chat-head .x { margin-left:auto; width:36px; height:36px; border:none; background:#f1f2f5; border-radius:50%; font-size:16px; cursor:pointer; }
    .chat-msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
    .msg { max-width:78%; padding:10px 13px; border-radius:16px; font-size:14px; line-height:1.35; word-break:break-word; }
    .msg.cliente { align-self:flex-end; background:var(--yellow); color:#000; border-bottom-right-radius:5px; }
    .msg.prestador { align-self:flex-start; background:#fff; color:#1a1a1a; border-bottom-left-radius:5px; box-shadow:0 2px 6px rgba(0,0,0,.06); }
    .msg small { display:block; font-size:9.5px; opacity:.55; margin-top:3px; text-align:right; }
    .chat-vazio { text-align:center; color:#9aa1ac; font-size:13px; margin:auto; }
    .chat-input { background:#fff; padding:12px; display:flex; gap:10px; align-items:center; }
    .chat-input input { flex:1; border:1.5px solid #ececf0; border-radius:999px; padding:12px 16px; font-family:inherit; font-size:14px; outline:none; }
    .chat-input button { width:46px; height:46px; border-radius:50%; border:none; background:var(--yellow); color:#000; font-size:17px; cursor:pointer; flex-shrink:0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="mapa"></div>

    <div class="track-top" id="trackTop">
      <div class="pulse"><i class="fa-solid fa-truck-pickup"></i></div>
      <div class="tt-info"><h1 id="topTitulo">Guincho a caminho</h1><p id="topSub"><span class="aovivo">● AO VIVO</span> · calculando rota...</p></div>
      <div class="tt-eta"><strong id="etaMin">—</strong><small>min</small></div>
    </div>

    <div class="track-card" id="trackCard" style="display:none">
      <img id="cardFoto" src="" alt="">
      <div class="tc-info"><strong id="cardNome">—</strong><small id="cardStatus">Seu guincho está chegando</small></div>
      <button class="chat-btn" id="btnChat"><i class="fa-solid fa-comments"></i> Chat<span class="chat-badge" id="chatBadge">0</span></button>
    </div>

    <div class="aviso" id="aviso">
      <i class="fa-solid fa-circle-info"></i>
      <h2 id="avisoTit">Carregando...</h2><p id="avisoMsg"></p>
    </div>

    <!-- CHAT -->
    <div class="chat-overlay" id="chatOverlay">
      <div class="chat-sheet">
        <div class="chat-head">
          <img id="chatFoto" src="" alt="">
          <div><strong id="chatNome">Prestador</strong><small>online</small></div>
          <button class="x" id="chatClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chat-msgs" id="chatMsgs"><div class="chat-vazio">Converse com o motorista em tempo real.</div></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="Escreva uma mensagem..." autocomplete="off">
          <button id="chatSend"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

    <!-- avaliação -->
    <div class="modal-avaliacao" id="modalAval">
      <div class="av-card" id="avForm">
        <div class="check"><i class="fa-solid fa-flag-checkered"></i></div>
        <h2 id="avPergunta">Como foi o atendimento?</h2>
        <p class="sub">Sua avaliação ajuda outros motoristas.</p>
        <div class="stars" id="stars">
          <i class="fa-solid fa-star" data-v="1"></i><i class="fa-solid fa-star" data-v="2"></i><i class="fa-solid fa-star" data-v="3"></i><i class="fa-solid fa-star" data-v="4"></i><i class="fa-solid fa-star" data-v="5"></i>
        </div>
        <textarea id="avComentario" rows="3" placeholder="Deixe um comentário (opcional)"></textarea>
        <button class="btn-enviar" id="btnEnviar" disabled>Enviar Avaliação</button>
      </div>
      <div class="av-card av-obrigado" id="avObrigado">
        <div class="check"><i class="fa-solid fa-heart"></i></div>
        <h2>Obrigado pela sua avaliação!</h2><p class="sub">Redirecionando...</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('t');
    const elAviso = document.getElementById('aviso');
    function mostrarAviso(tit, msg, icone='fa-circle-info') {
      document.querySelector('.aviso i').className = 'fa-solid ' + icone;
      document.getElementById('avisoTit').textContent = tit;
      document.getElementById('avisoMsg').textContent = msg;
      elAviso.classList.add('show');
    }
    function distKm(a, b) {
      const R=6371, r=(d)=>d*Math.PI/180;
      const dLat=r(b.lat-a.lat), dLon=r(b.lng-a.lng);
      const x=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function bearing(a, b) {
      const toR=(d)=>d*Math.PI/180, toD=(r)=>r*180/Math.PI;
      const dLon=toR(b.lng-a.lng);
      const y=Math.sin(dLon)*Math.cos(toR(b.lat));
      const x=Math.cos(toR(a.lat))*Math.sin(toR(b.lat))-Math.sin(toR(a.lat))*Math.cos(toR(b.lat))*Math.cos(dLon);
      return (toD(Math.atan2(y,x))+360)%360;
    }
    // car.png aponta pra ESQUERDA por padrão -> offset +90 p/ alinhar com a direção (bearing)
    const carIcon = (deg) => L.divIcon({ className:'car-divicon', html:`<img src="/img/car.png" style="width:48px;height:48px;display:block;transition:transform .4s ease;transform:rotate(${deg + 90}deg);filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))">`, iconSize:[48,48], iconAnchor:[24,24] });
    const voceIcon = () => L.divIcon({ className:'voce-icon', html:`<span class="voce-pulse"></span><span class="voce-dot"></span><span class="voce-label">Seu local</span>`, iconSize:[0,0], iconAnchor:[0,0] });

    let mapa, mGuincho, mVoce, rota, prevGuincho = null, lastDeg = 0, cliente = null, chamado, prestador, canal, canalMsg, notaSel = 0;

    async function init() {
      if (!token) return mostrarAviso('Link inválido', 'Este link de rastreio não tem um código válido.', 'fa-triangle-exclamation');
      if (!window.sb) return mostrarAviso('Conexão indisponível', 'Recarregue a página.', 'fa-gear');

      const { data, error } = await sb.from('chamados').select('*').eq('link_token', token).single();
      if (error || !data) return mostrarAviso('Chamado não encontrado', 'Verifique o link recebido.', 'fa-triangle-exclamation');
      chamado = data;

      const pid = chamado.prestador_id || chamado.prestador_notificado_id;
      const { data: pr } = await sb.from('prestadores').select('nome,foto_url,bairro').eq('id', pid).single();
      prestador = pr || { nome:'Prestador' };
      preencherCard();

      // local do cliente: partida do chamado, ou geolocalização, ou posição do guincho
      cliente = (chamado.local_partida_lat) ? { lat:+chamado.local_partida_lat, lng:+chamado.local_partida_lng } : null;
      if (!cliente && navigator.geolocation) {
        await new Promise((res) => navigator.geolocation.getCurrentPosition(
          (p)=>{ cliente={lat:p.coords.latitude,lng:p.coords.longitude}; res(); }, ()=>res(), {timeout:6000}));
      }

      if (chamado.status === 'Finalizado') return desativarMapaEMostrarAvaliacao();
      iniciarMapa();
      escutarRealtime();
      iniciarChat(pid);
    }

    function preencherCard() {
      document.getElementById('cardNome').textContent = prestador.nome;
      document.getElementById('chatNome').textContent = prestador.nome;
      const foto = prestador.foto_url || ('https://ui-avatars.com/api/?name='+encodeURIComponent(prestador.nome)+'&background=0D0D0D&color=ffdd00');
      document.getElementById('cardFoto').src = foto;
      document.getElementById('chatFoto').src = foto;
      document.getElementById('trackCard').style.display = 'flex';
    }

    function guinchoPos() {
      if (chamado.latitude_atual_guincho) return { lat:+chamado.latitude_atual_guincho, lng:+chamado.longitude_atual_guincho };
      if (cliente) return { lat:cliente.lat+0.012, lng:cliente.lng-0.015 };
      return { lat:-22.9068, lng:-43.1729 };
    }

    // rota pelas RUAS (OSRM, grátis) — segue o traçado das vias
    let rotaBg = null, rotaFg = null, lastRota = 0;
    async function rotaRuas(a, b) {
      try {
        const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`);
        const d = await r.json();
        if (d.routes && d.routes[0]) return { coords: d.routes[0].geometry.coordinates.map(p => [p[1], p[0]]), dur: d.routes[0].duration, dist: d.routes[0].distance };
      } catch (e) {}
      return { coords: [[a.lat, a.lng], [b.lat, b.lng]], dur: null, dist: null }; // fallback reta
    }
    async function desenharRota(g, c) {
      const { coords, dur, dist } = await rotaRuas(g, c);
      if (rotaBg) mapa.removeLayer(rotaBg);
      if (rotaFg) mapa.removeLayer(rotaFg);
      rotaBg = L.polyline(coords, { color:'#000', weight:7, opacity:.9, lineCap:'round', lineJoin:'round' }).addTo(mapa);
      rotaFg = L.polyline(coords, { color:'#ffdd00', weight:3.5, opacity:1, lineCap:'round', lineJoin:'round' }).addTo(mapa);
      const min = dur != null ? Math.max(1, Math.round(dur / 60)) : (cliente ? Math.max(1, Math.round(distKm(g, c) * 2.3)) : null);
      const km = dist != null ? dist / 1000 : (cliente ? distKm(g, c) : null);
      setETA(min, km);
      lastRota = Date.now();
    }
    function setETA(min, km) {
      if (min != null) document.getElementById('etaMin').textContent = min;
      document.getElementById('topSub').innerHTML = '<span class="aovivo">● AO VIVO</span>' + (km != null ? ' · ' + km.toFixed(1).replace('.', ',') + ' km de você' : '');
    }

    function iniciarMapa() {
      const g = guinchoPos();
      const c = cliente || g;
      mapa = L.map('mapa', { zoomControl:false, attributionControl:false }).setView([g.lat, g.lng], 15);
      L.tileLayer(`https://api.maptiler.com/maps/${MAPTILER_STYLE}/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`, { tileSize:512, zoomOffset:-1, minZoom:1, maxZoom:20, crossOrigin:true }).addTo(mapa);
      if (cliente) mVoce = L.marker([c.lat, c.lng], { icon: voceIcon() }).addTo(mapa);
      prevGuincho = g;
      lastDeg = bearing(g, c);
      mGuincho = L.marker([g.lat, g.lng], { icon: carIcon(lastDeg) }).addTo(mapa);
      desenharRota(g, c);   // desenha a rota pelas ruas
      enquadrar();
    }
    function enquadrar() {
      const g = guinchoPos(), c = cliente || g;
      mapa.fitBounds(L.latLngBounds([[g.lat,g.lng],[c.lat,c.lng]]), { padding:[80,80], maxZoom:16 });
    }

    function atualizarGuincho(la, lo) {
      const g = { lat:+la, lng:+lo }; const c = cliente || g;
      // só gira o carro quando ele REALMENTE se desloca (evita rodopio por ruído de GPS)
      const moved = prevGuincho ? distKm(prevGuincho, g) : 0;
      if (moved > 0.004) lastDeg = bearing(prevGuincho, g); // aponta pra frente, na direção da rua
      mGuincho.setLatLng([g.lat, g.lng]);
      mGuincho.setIcon(carIcon(lastDeg));
      prevGuincho = g;
      mapa.panTo([g.lat, g.lng], { animate:true, duration:1 });
      // refaz a rota pelas ruas (no máximo a cada 7s) + atualiza ETA
      if (Date.now() - lastRota > 7000) desenharRota(g, c);
    }

    function escutarRealtime() {
      canal = sb.channel('track-'+token).on('postgres_changes',
        { event:'UPDATE', schema:'public', table:'chamados', filter:`link_token=eq.${token}` },
        (p) => {
          const { latitude_atual_guincho:la, longitude_atual_guincho:lo, status } = p.new;
          if (status === 'Chegou') {
            document.getElementById('topTitulo').textContent = 'Seu Guincho chegou! 🎉';
            document.getElementById('topSub').innerHTML = '<span class="aovivo">● AO VIVO</span> · ele está no seu local';
            document.getElementById('cardStatus').textContent = 'Chegou ao seu local';
            const eta = document.getElementById('etaMin'); eta.textContent = '✓'; eta.parentElement.querySelector('small').textContent = 'aqui';
          } else {
            document.getElementById('topTitulo').textContent = status === 'Iniciado' ? 'A caminho do destino' : 'Guincho a caminho';
          }
          if (status === 'Finalizado') { if (canal) canal.unsubscribe(); desativarMapaEMostrarAvaliacao(); return; }
          if (la) atualizarGuincho(la, lo);
        }).subscribe();
    }

    /* ---------- CHAT em tempo real ---------- */
    const chatOverlay = document.getElementById('chatOverlay');
    const somChat = new Audio('/audio/chat.mp3'); somChat.preload = 'auto';
    function tocarChat() { try { somChat.currentTime = 0; somChat.play().catch(()=>{}); } catch(e){} }
    function checkHtml(lida) { return `<i class="fa-solid fa-check-double" style="font-size:11px;margin-left:4px;color:${lida ? '#34b7f1' : '#b9bdc4'}"></i>`; }
    let naoLidas = 0;
    function iniciarChat() {
      carregarMensagens();
      canalMsg = sb.channel('chat-'+chamado.id)
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'mensagens', filter:`chamado_id=eq.${chamado.id}` }, (p) => {
          addMsg(p.new); tocarChat();
          if (p.new.autor === 'prestador') {
            if (chatOverlay.classList.contains('open')) marcarLidas();
            else { naoLidas++; const b=document.getElementById('chatBadge'); b.textContent=naoLidas; b.style.display='inline-block'; }
          }
        })
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'mensagens', filter:`chamado_id=eq.${chamado.id}` }, (p) => atualizarCheck(p.new))
        .subscribe();
    }
    async function carregarMensagens() {
      const { data } = await sb.from('mensagens').select('*').eq('chamado_id', chamado.id).order('created_at', { ascending:true });
      const box = document.getElementById('chatMsgs');
      if (data && data.length) { box.innerHTML = ''; data.forEach(addMsg); }
      if (chatOverlay.classList.contains('open')) marcarLidas();
    }
    function addMsg(m) {
      const box = document.getElementById('chatMsgs');
      const vazio = box.querySelector('.chat-vazio'); if (vazio) vazio.remove();
      const div = document.createElement('div');
      div.className = 'msg ' + (m.autor === 'cliente' ? 'cliente' : 'prestador');
      const hora = new Date(m.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
      const ck = m.autor === 'cliente' ? `<span class="ck" data-id="${m.id}">${checkHtml(m.lida)}</span>` : '';
      div.innerHTML = `${m.texto.replace(/</g,'&lt;')}<small>${hora}${ck}</small>`;
      box.appendChild(div); box.scrollTop = box.scrollHeight;
    }
    function atualizarCheck(m) {
      if (m.autor !== 'cliente') return;
      const ck = document.querySelector('.ck[data-id="'+m.id+'"]');
      if (ck) ck.innerHTML = checkHtml(m.lida);
    }
    async function marcarLidas() {
      await sb.from('mensagens').update({ lida:true }).eq('chamado_id', chamado.id).eq('autor', 'prestador').eq('lida', false);
    }
    document.getElementById('btnChat').addEventListener('click', () => {
      chatOverlay.classList.add('open'); naoLidas=0; document.getElementById('chatBadge').style.display='none';
      document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;
      marcarLidas();
    });
    document.getElementById('chatClose').addEventListener('click', () => chatOverlay.classList.remove('open'));
    async function enviarMsg() {
      const inp = document.getElementById('chatInput'); const txt = inp.value.trim(); if (!txt) return;
      inp.value = '';
      await sb.from('mensagens').insert({ chamado_id: chamado.id, autor: 'cliente', texto: txt });
    }
    document.getElementById('chatSend').addEventListener('click', enviarMsg);
    document.getElementById('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') enviarMsg(); });

    /* ---------- AVALIAÇÃO ---------- */
    function desativarMapaEMostrarAvaliacao() {
      document.getElementById('mapa').style.display='none';
      document.getElementById('trackTop').style.display='none';
      document.getElementById('trackCard').style.display='none';
      chatOverlay.classList.remove('open');
      document.getElementById('avPergunta').textContent = `Como foi o atendimento de ${prestador.nome}?`;
      document.getElementById('modalAval').classList.add('show');
    }
    const stars = [...document.querySelectorAll('#stars i')];
    function pintar(n){ stars.forEach((s,i)=>s.classList.toggle('active', i<n)); }
    stars.forEach((s)=>{ s.addEventListener('mouseover',()=>pintar(+s.dataset.v)); s.addEventListener('mouseout',()=>pintar(notaSel)); s.addEventListener('click',()=>{ notaSel=+s.dataset.v; pintar(notaSel); document.getElementById('btnEnviar').disabled=false; }); });
    document.getElementById('btnEnviar').addEventListener('click', async () => {
      if (!notaSel) return; const btn=document.getElementById('btnEnviar'); btn.disabled=true; btn.textContent='Enviando...';
      const { error } = await sb.from('avaliacoes').insert({ prestador_id: chamado.prestador_id||chamado.prestador_notificado_id, chamado_id: chamado.id, nota: notaSel, comentario: document.getElementById('avComentario').value.trim()||null });
      if (error) { btn.disabled=false; btn.textContent='Tentar novamente'; alert('Erro: '+error.message); return; }
      document.getElementById('avForm').style.display='none'; document.getElementById('avObrigado').style.display='block';
      setTimeout(()=>{ location.href='/'; }, 2600);
    });

    init();
  </script>
</body>
</html>
