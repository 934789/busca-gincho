<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>Busca Guincho — Administração</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">
      <img class="logo-icon-img" src="/img/logo3.png" alt="Busca Guincho"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <h1 style="display:none">Busca<span>Guincho</span></h1>
      <p><i class="fa-solid fa-crown" style="color:var(--yellow)"></i> Painel Administrativo</p>
    </div>

    <div class="auth-card">
      <h2><i class="fa-solid fa-lock"></i> Acesso restrito</h2>
      <form id="loginForm">
        <div class="field"><label>Usuário</label><input type="text" id="user" placeholder="admin" required></div>
        <div class="field"><label>Senha</label><input type="password" id="pass" required></div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p class="form-msg" id="msg"></p>
      </form>
    </div>
    <p class="auth-link"><a href="/">← Voltar ao site</a></p>
  </div>

  <script>
    // ⚠️ Gate de protótipo (client-side). A proteção real dos dados é via RLS do Supabase.
    // Em produção, trocar por Supabase Auth.
    const ADMIN_USER = 'admin', ADMIN_PASS = 'bg##1';
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      if (user.value.trim() === ADMIN_USER && pass.value === ADMIN_PASS) {
        sessionStorage.setItem('admin_ok', '1');
        location.href = 'painel.html';
      } else { msg.className = 'form-msg error'; msg.textContent = 'Credenciais inválidas.'; }
    });
  </script>
</body>
</html>
