<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1f3c" />
  <title>BuscaGincho — Área do Prestador</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">
      <img class="logo-img" src="../img/logo.png" alt="BuscaGincho"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <h1 style="display:none">BUSCA<span>GINCHO</span></h1>
      <p>Área do Prestador de Serviço</p>
    </div>

    <div class="auth-card">
      <h2><i class="fa-solid fa-right-to-bracket"></i> Acessar minha conta</h2>
      <form id="loginForm">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="Senha fornecida pela administração" required />
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p class="form-msg" id="msg"></p>
      </form>
      <p class="helper" style="margin-top:14px">
        Teste: <strong>marcos@buscagincho.com</strong> / <strong>troque123</strong>
      </p>
    </div>

    <p class="auth-link">
      Ainda não é parceiro? O cadastro é feito pela administração.<br>
      <a href="../index.html">← Voltar ao site</a>
    </p>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'form-msg'; msg.textContent = 'Verificando...';
      const r = await API.loginPrestador(document.getElementById('email').value.trim(), document.getElementById('senha').value);
      if (!r.ok) { msg.className = 'form-msg error'; msg.textContent = r.data.error || 'E-mail ou senha inválidos.'; return; }
      location.href = 'painel.html';
    });
  </script>
</body>
</html>
