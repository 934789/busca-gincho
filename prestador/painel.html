<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1f3c" />
  <title>BuscaGincho — Meu Painel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="dash">
    <header class="dash-header">
      <img class="logo-img" src="../img/logo.png" alt="BuscaGincho" onerror="this.style.display='none'" />
      <h1>Meu Painel</h1>
      <button class="btn-ghost" id="btnSair"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </header>

    <!-- ESTATÍSTICAS -->
    <section class="dash-section">
      <h2><i class="fa-solid fa-chart-line"></i> Minhas Estatísticas</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-eye"></i></div><div class="stat-num" id="s_views">—</div><div class="stat-label">Visualizações do Perfil</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fa-brands fa-whatsapp"></i></div><div class="stat-num" id="s_whats">—</div><div class="stat-label">Cliques no WhatsApp</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-phone"></i></div><div class="stat-num" id="s_ligar">—</div><div class="stat-label">Cliques em Ligar</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fa-solid fa-star"></i></div><div class="stat-num" id="s_aval">—</div><div class="stat-label">Avaliação Média</div></div>
        <div class="stat-card accent" style="grid-column:1/-1"><div class="stat-icon"><i class="fa-solid fa-arrow-trend-up"></i></div><div class="stat-num" id="s_total">—</div><div class="stat-label">Total de Contatos recebidos pela plataforma</div></div>
      </div>
    </section>

    <!-- PERFIL -->
    <section class="dash-section">
      <h2><i class="fa-solid fa-id-card"></i> Meu Perfil</h2>
      <form id="perfilForm">
        <div class="field"><label>Nome de exibição</label><input type="text" id="nome" required></div>
        <div class="field"><label>WhatsApp (com DDD, só números)</label><input type="text" id="whatsapp" placeholder="5521987654321" required></div>
        <div class="field"><label>Telefone para ligação</label><input type="text" id="telefone" placeholder="552133334444"></div>
        <div class="field"><label>URL da foto de perfil</label><input type="url" id="foto_url" placeholder="https://..."></div>
        <div class="field"><label>Regiões que atende</label><textarea id="regioes" rows="2"></textarea></div>

        <h2 style="margin-top:8px"><i class="fa-solid fa-list-check"></i> Serviços que ofereço</h2>
        <div class="check-grid" id="servicosGrid"></div>

        <button type="submit" class="btn-primary" style="margin-top:18px">Salvar alterações</button>
        <p class="form-msg" id="msgPerfil"></p>
      </form>
    </section>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const PID = sessionStorage.getItem('prestador_id');
    if (!PID || !API.token('prestador')) location.href = 'login.html';
    document.getElementById('btnSair').onclick = () => { sessionStorage.clear(); location.href = 'login.html'; };

    const grid = document.getElementById('servicosGrid');
    API.SERVICOS.forEach((s) => {
      const lbl = document.createElement('label');
      lbl.className = 'check-item';
      lbl.innerHTML = `<input type="checkbox" data-key="${s.key}"><i class="fa-solid ${s.icon}"></i> ${s.label}`;
      const cb = lbl.querySelector('input');
      cb.addEventListener('change', () => lbl.classList.toggle('on', cb.checked));
      grid.appendChild(lbl);
    });

    async function carregarPerfil() {
      const p = await API.prestador(PID);
      if (!p) return;
      nome.value = p.nome || ''; whatsapp.value = p.whatsapp || ''; telefone.value = p.telefone || '';
      foto_url.value = p.foto_url || ''; regioes.value = p.atendimento_regioes || '';
      API.SERVICOS.forEach((s) => {
        const cb = grid.querySelector(`[data-key="${s.key}"]`);
        cb.checked = !!p[s.key]; cb.closest('.check-item').classList.toggle('on', cb.checked);
      });
    }

    async function carregarStats() {
      const st = await API.statsPrestador(PID);
      if (!st) return;
      s_views.textContent = st.views;
      s_whats.textContent = st.clicks_whatsapp;
      s_ligar.textContent = st.clicks_ligar;
      s_aval.textContent  = Number(st.avaliacao).toFixed(1).replace('.', ',');
      s_total.textContent = st.total_contatos;
    }

    document.getElementById('perfilForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msgPerfil');
      const patch = {
        nome: nome.value.trim(),
        whatsapp: whatsapp.value.replace(/\D/g, ''),
        telefone: telefone.value.replace(/\D/g, ''),
        foto_url: foto_url.value.trim(),
        atendimento_regioes: regioes.value.trim(),
      };
      API.SERVICOS.forEach((s) => { patch[s.key] = grid.querySelector(`[data-key="${s.key}"]`).checked; });
      const r = await API.salvarPerfil(PID, patch);
      msg.className = 'form-msg ' + (r.ok ? 'ok' : 'error');
      msg.textContent = r.ok ? '✓ Alterações salvas com sucesso!' : 'Erro ao salvar.';
    });

    carregarPerfil();
    carregarStats();
  </script>
</body>
</html>
