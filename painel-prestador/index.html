<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>Busca Guincho — Área do Prestador</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root{ --ink:#0D0D0D; --yellow:#FFC400; --line:#E9EAEE; --soft:#8A8F98; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Poppins',system-ui,sans-serif; min-height:100vh; color:#16181d;
      display:flex; align-items:center; justify-content:center; padding:24px;
      background:
        radial-gradient(880px 380px at 50% -10%, rgba(255,196,0,.20), transparent 60%),
        linear-gradient(180deg, #FAFBFC 0%, #EDEEF1 100%); }
    .login{ width:100%; max-width:400px; }
    .brand{ text-align:center; margin-bottom:22px; }
    .brand img{ height:40px; }
    .brand .sub{ margin-top:11px; font-size:13px; font-weight:600; color:var(--soft);
      display:inline-flex; align-items:center; gap:7px; }
    .brand .sub i{ color:#E0A800; }
    .card{ background:#fff; border:1px solid var(--line); border-radius:22px; padding:26px 24px;
      box-shadow:0 22px 55px -20px rgba(20,24,40,.28); }
    .card h2{ font-size:19px; font-weight:800; letter-spacing:-.3px; }
    .card .lead{ font-size:13px; color:var(--soft); margin:5px 0 20px; }
    .field{ margin-bottom:14px; }
    .field label{ display:block; font-size:12.5px; font-weight:700; color:#3c3f46; margin-bottom:7px; }
    .input{ position:relative; }
    .input .lead-ic{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#b3b7bf; font-size:15px; }
    .input input{ width:100%; border:1.6px solid var(--line); background:#F7F8FA; border-radius:13px;
      padding:14px 44px 14px 42px; font-family:inherit; font-size:14.5px; color:#16181d; outline:none; transition:.15s; }
    .input input::placeholder{ color:#b3b7bf; }
    .input input:focus{ border-color:var(--yellow); background:#fff; box-shadow:0 0 0 4px rgba(255,196,0,.18); }
    .input .toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%); width:34px; height:34px;
      border:none; background:transparent; color:#b3b7bf; cursor:pointer; border-radius:8px; font-size:15px; }
    .input .toggle:hover{ color:var(--ink); }
    .btn{ width:100%; border:none; border-radius:13px; padding:15px; margin-top:6px; cursor:pointer;
      font-family:inherit; font-weight:800; font-size:15px; color:#fff; background:var(--ink);
      display:flex; align-items:center; justify-content:center; gap:9px; transition:.15s;
      box-shadow:0 12px 24px -10px rgba(13,13,13,.55); }
    .btn:hover{ transform:translateY(-1px); box-shadow:0 16px 28px -10px rgba(13,13,13,.6); }
    .btn:active{ transform:translateY(0); }
    .btn i{ color:var(--yellow); }
    .msg{ font-size:13px; font-weight:600; margin-top:12px; text-align:center; min-height:18px; }
    .msg.error{ color:#e23c3c; } .msg.ok{ color:#1f9d57; }
    .foot{ text-align:center; font-size:12px; color:var(--soft); margin-top:18px;
      display:flex; align-items:center; justify-content:center; gap:7px; }
    .foot i{ color:#1f9d57; }
  </style>
</head>
<body>
  <div class="login">
    <div class="brand">
      <img src="/img/logo_comprovante.png" alt="Busca Guincho" />
      <div class="sub"><i class="fa-solid fa-helmet-safety"></i> Área do Prestador de Serviço</div>
    </div>

    <div class="card">
      <h2>Acessar minha conta</h2>
      <p class="lead">Entre com os dados fornecidos pela administração.</p>
      <form id="loginForm">
        <div class="field">
          <label>E-mail</label>
          <div class="input">
            <i class="fa-solid fa-envelope lead-ic"></i>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="username" required />
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input">
            <i class="fa-solid fa-lock lead-ic"></i>
            <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required />
            <button type="button" class="toggle" id="toggleSenha" aria-label="Mostrar senha"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>
        <p class="msg" id="msg"></p>
      </form>
      <p class="foot"><i class="fa-solid fa-shield-halved"></i> Acesso seguro e exclusivo de parceiros</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script>
    const tgl = document.getElementById('toggleSenha');
    tgl.addEventListener('click', () => {
      const s = document.getElementById('senha');
      const showing = s.type === 'text';
      s.type = showing ? 'password' : 'text';
      tgl.innerHTML = showing ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.className = 'msg'; msg.textContent = 'Verificando...';
      if (!sb) { msg.className = 'msg error'; msg.textContent = 'Supabase não configurado.'; return; }
      const email = document.getElementById('email').value.trim().toLowerCase();
      const senha = document.getElementById('senha').value;
      const { data, error } = await sb.from('prestadores')
        .select('id, nome').eq('email', email).eq('senha_provisoria', senha).maybeSingle();
      if (error || !data) { msg.className = 'msg error'; msg.textContent = 'E-mail ou senha inválidos.'; return; }
      msg.className = 'msg ok'; msg.textContent = 'Bem-vindo! Entrando...';
      sessionStorage.setItem('prestador_id', data.id);
      sessionStorage.setItem('prestador_nome', data.nome);
      location.href = 'painel.html';
    });
  </script>
</body>
</html>
